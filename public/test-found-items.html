<!DOCTYPE html>
<html>
<head>
    <title>Test Found Items API</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Found Items API</h1>
    <button onclick="testAPI('all')">Test All Items</button>
    <button onclick="testAPI('active')">Test Active Items</button>
    <button onclick="testAPI('returned')">Test Returned Items</button>
    <button onclick="testAPI('expired')">Test Expired Items</button>
    
    <h2>Response:</h2>
    <pre id="output">Click a button to test the API</pre>
    
    <script>
        async function testAPI(filter) {
            const output = document.getElementById('output');
            output.textContent = 'Loading...';
            
            try {
                const url = `/dashboard/lost-and-found/admin/get-found-items?filter=${filter}`;
                console.log('Fetching:', url);
                
                const response = await fetch(url);
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const data = await response.json();
                console.log('Response data:', data);
                
                output.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                console.error('Error:', error);
                output.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
